name: Build and deploy extension to Bazaar
on:
  workflow_dispatch:
  push:
    tags:
      - '*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker Image for Release
        run: docker build -t water-linked-dvl:${{ github.ref_name }} .
      # Note: Custom extension registry action not configured
      # To enable publishing to CoratiaOS extension marketplace, configure appropriate secrets and action
